name: Deploy Folio to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build — bundle local dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download third-party libraries
        run: |
          mkdir -p lib

          # JSZip — EPUB parsing
          curl -fsSL "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" \
               -o lib/jszip.min.js

          # PDF.js — PDF rendering (main bundle)
          curl -fsSL "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" \
               -o lib/pdf.min.js

          # PDF.js — web worker (must be same origin for offline use)
          curl -fsSL "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js" \
               -o lib/pdf.worker.min.js

          # Mammoth.js — DOCX → HTML conversion
          curl -fsSL "https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js" \
               -o lib/mammoth.min.js

          # Noto Nastaliq Urdu — Urdu rendering
          curl -fsSL "https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" \
               -o /tmp/nastaliq.css
          # Extract the woff2 URL and download the font file
          WOFF2=$(grep -o "https://[^)]*\.woff2[^)]*" /tmp/nastaliq.css | head -1)
          if [ -n "$WOFF2" ]; then
            curl -fsSL "$WOFF2" -o lib/NotoNastaliqUrdu.woff2
            # Rewrite the css to point at the local file
            sed "s|$WOFF2|./NotoNastaliqUrdu.woff2|g" /tmp/nastaliq.css > lib/nastaliq.css
          fi

          # Noto Naskh Arabic — Arabic rendering
          curl -fsSL "https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&display=swap" \
               -o /tmp/naskh.css
          WOFF2=$(grep -o "https://[^)]*\.woff2[^)]*" /tmp/naskh.css | head -1)
          if [ -n "$WOFF2" ]; then
            curl -fsSL "$WOFF2" -o lib/NotoNaskhArabic.woff2
            sed "s|$WOFF2|./NotoNaskhArabic.woff2|g" /tmp/naskh.css > lib/naskh.css
          fi

          echo "Downloaded files:"
          ls -lh lib/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
